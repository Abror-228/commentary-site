<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="admin-body">
    <div class="container" style="max-width: 900px;">
        <div class="glass-card">
            <div class="admin-header">
                <h2 class="title admin-title">Система Управления</h2>
                <a href="/" class="glass-btn outline-btn back-btn">Выйти на главную</a>
            </div>
            <p class="subtitle">Статистика активности пользователей сайта</p>
            <div class="divider"></div>
            
            <div class="stats-cards">
                <div class="stat-card">
                    <div class="stat-value">{{ total_users }}</div>
                    <div class="stat-label">Зарегистрировано</div>
                </div>
            </div>
            
            <div class="users-list-section">
                <h5 class="section-title">Список пользователей</h5>
                {% if not users %}
                    <div class="empty-state">База данных пуста</div>
                {% else %}
                    <div class="users-grid">
                        {% for user in users %}
                            <div class="user-badge">
                                <span class="user-id">#{{ loop.index }}</span>
                                <span class="user-name">{{ user }}</span>
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
