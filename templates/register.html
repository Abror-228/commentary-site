<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="centered-body">
    <div class="glass-card login-card">
        <h2 class="title">Создать аккаунт</h2>
        <p class="subtitle">Присоединяйтесь к нашему премиум-сообществу</p>
        
        <!-- Выровняли форму в одну линию -->
        <form method="POST" class="inline-form">
            <input type="text" name="username" class="glass-input flex-grow" placeholder="Имя пользователя" required>
            <input type="password" name="password" class="glass-input flex-grow" placeholder="Пароль" required>
            <button type="submit" class="glass-btn primary-btn">Зарегистрироваться</button>
        </form>
        
        <a href="/" class="back-link">← Вернуться назад</a>
    </div>
</body>
</html>
