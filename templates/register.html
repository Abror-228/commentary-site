<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация аккаунта</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Inter', sans-serif;
            height: 100vh;
        }
        .reg-card {
            background: #ffffff;
            border: 1px solid #e9ecef;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            padding: 40px 35px;
        }
        .form-input-custom {
            border: 1px solid #ced4da;
            border-radius: 8px;
            padding: 12px;
        }
        .form-input-custom:focus {
            border-color: #198754;
            box-shadow: 0 0 0 0.25rem rgba(25, 135, 84, 0.25);
        }
        .btn-green {
            background-color: #198754;
            color: #ffffff;
            border-radius: 8px;
            font-weight: 500;
            padding: 12px;
            border: none;
        }
        .btn-green:hover {
            background-color: #146c43;
        }
    </style>
</head>
<body class="d-flex align-items-center">

    <div class="container" style="max-width: 440px;">
        <div class="reg-card">
            <h3 class="fw-bold text-center mb-2">Создать аккаунт</h3>
            <p class="text-center text-muted small mb-4">Зарегистрируйтесь, чтобы участвовать в обсуждениях</p>
            
            <form method="POST" class="d-flex flex-column gap-3">
                <div>
                    <label class="form-label small fw-semibold text-secondary">Имя пользователя</label>
                    <input type="text" name="username" class="form-control form-input-custom" placeholder="alex_green" required>
                </div>
                <div>
                    <label class="form-label small fw-semibold text-secondary">Пароль</label>
                    <input type="password" name="password" class="form-control form-input-custom" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-green w-100 mt-2">Зарегистрироваться</button>
                <a href="/" class="text-center text-secondary small mt-2 text-decoration-none">← На главную страницу</a>
            </form>
        </div>
    </div>

</body>
</html>
