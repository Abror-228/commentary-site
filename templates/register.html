<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body {
            background-color: #fafafa;
            font-family: 'Inter', sans-serif;
            height: 100vh;
        }
        .auth-card {
            background: #ffffff;
            border: 1px solid rgba(0,0,0,0.04);
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.02);
            padding: 40px;
        }
        .input-premium {
            border: 1px solid #e5e5e5;
            border-radius: 12px;
            padding: 14px;
        }
        .input-premium:focus {
            border-color: #000000;
            box-shadow: 0 0 0 4px rgba(0,0,0,0.03);
        }
        .btn-premium {
            background-color: #000000;
            color: #ffffff;
            border-radius: 12px;
            font-weight: 500;
            padding: 14px;
            border: none;
        }
    </style>
</head>
<body class="d-flex align-items-center">

    <div class="container" style="max-width: 420px;">
        <div class="auth-card">
            <h3 class="fw-bold text-start mb-1" style="letter-spacing: -0.5px;">Регистрация</h3>
            <p class="text-muted small mb-4">Создайте учетную запись клиента</p>
            
            <form method="POST" class="d-flex flex-column gap-3">
                <div>
                    <input type="text" name="username" class="form-control input-premium" placeholder="Имя пользователя" required>
                </div>
                <div>
                    <input type="password" name="password" class="form-control input-premium" placeholder="Пароль" required>
                </div>
                <button type="submit" class="btn btn-premium w-100 mt-2">Зарегистрироваться</button>
                <a href="/" class="text-center text-muted small mt-3 text-decoration-none">← Вернуться назад</a>
            </form>
        </div>
    </div>

</body>
</html>
